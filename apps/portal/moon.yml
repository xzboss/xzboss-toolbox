$schema: 'https://moonrepo.dev/schemas/project.json'

type: application
language: typescript
stack: frontend

tasks:
  build:
    command: 'pnpm run build'
    outputs:
      - 'dist'
  dev:
    command: 'pnpm run dev'
    local: true
  lint:
    command: 'pnpm run lint'
  test:
    command: 'pnpm run test'
